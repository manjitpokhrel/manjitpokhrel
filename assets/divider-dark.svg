<svg width="1200" height="32" viewBox="0 0 1200 32" fill="none"
  xmlns="http://www.w3.org/2000/svg">

  <rect width="1200" height="32" fill="#0D1117"/>
  <line x1="0" y1="16" x2="1200" y2="16" stroke="#21262D" stroke-width="1"/>

  <!-- animated dot traversing the divider -->
  <circle cx="0" cy="16" r="3" fill="#F0F6FC" opacity="0.8">
    <animate attributeName="cx"
      values="0;1200;0"
      dur="7s"
      keyTimes="0;0.5;1"
      keySplines="0.4 0 0.6 1;0.4 0 0.6 1"
      calcMode="spline"
      repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0;0.9;0"
      dur="7s"
      repeatCount="indefinite"/>
  </circle>

  <!-- centre diamond -->
  <rect x="597" y="13" width="6" height="6" fill="#21262D"
    transform="rotate(45 600 16)"/>
  <rect x="598" y="14" width="4" height="4" fill="#F0F6FC" opacity="0.4"
    transform="rotate(45 600 16)">
    <animate attributeName="opacity"
      values="0.2;0.9;0.2"
      dur="2.4s"
      repeatCount="indefinite"/>
  </rect>
</svg>