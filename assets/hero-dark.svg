<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none"
  xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Manjit Pokhrel">

  <rect width="1200" height="320" fill="#0D1117"/>

  <!-- outer border -->
  <rect x="24" y="24" width="1152" height="272" rx="2"
    stroke="#21262D" stroke-width="1"/>

  <!-- top corner marks -->
  <line x1="24" y1="24" x2="64" y2="24" stroke="#F0F6FC" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="24" y1="24" x2="24" y2="64" stroke="#F0F6FC" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="1176" y1="24" x2="1136" y2="24" stroke="#F0F6FC" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="1176" y1="24" x2="1176" y2="64" stroke="#F0F6FC" stroke-width="1.5" stroke-opacity="0.8"/>

  <!-- bottom corner marks -->
  <line x1="24" y1="296" x2="64" y2="296" stroke="#F0F6FC" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="24" y1="296" x2="24" y2="256" stroke="#F0F6FC" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="1176" y1="296" x2="1136" y2="296" stroke="#F0F6FC" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="1176" y1="296" x2="1176" y2="256" stroke="#F0F6FC" stroke-width="1.5" stroke-opacity="0.8"/>

  <!-- eyebrow left -->
  <text x="60" y="58"
    fill="#6E7681"
    font-family="JetBrains Mono, Menlo, monospace"
    font-size="11"
    letter-spacing="3">KATHMANDU · NEPAL</text>

  <!-- eyebrow right -->
  <text x="1140" y="58" text-anchor="end"
    fill="#6E7681"
    font-family="JetBrains Mono, Menlo, monospace"
    font-size="11"
    letter-spacing="3">INDEPENDENT RESEARCHER</text>

  <!-- horizontal rule under eyebrow -->
  <line x1="60" y1="68" x2="1140" y2="68"
    stroke="#21262D" stroke-width="1"/>

  <!-- name -->
  <text x="600" y="148" text-anchor="middle"
    fill="#F0F6FC"
    font-family="Segoe UI, Helvetica Neue, Arial, sans-serif"
    font-size="52"
    font-weight="700"
    letter-spacing="10">MANJIT POKHREL</text>

  <!-- title -->
  <text x="600" y="185" text-anchor="middle"
    fill="#8B949E"
    font-family="JetBrains Mono, Menlo, monospace"
    font-size="13"
    letter-spacing="2.4">ADVERSARIAL ML · AI SECURITY · GPU KERNEL OPTIMIZATION</text>

  <!-- animated scan line -->
  <rect x="60" y="206" width="1080" height="1" fill="#21262D"/>
  <rect x="60" y="205.5" width="140" height="2" rx="1" fill="#F0F6FC" opacity="0.6">
    <animate attributeName="x"
      values="60;980;60"
      dur="6s"
      keyTimes="0;0.5;1"
      keySplines="0.4 0 0.6 1;0.4 0 0.6 1"
      calcMode="spline"
      repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0.2;0.9;0.2"
      dur="6s"
      repeatCount="indefinite"/>
  </rect>

  <!-- dot left -->
  <circle cx="60" cy="206" r="2.5" fill="#F0F6FC">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- dot right -->
  <circle cx="1140" cy="206" r="2.5" fill="#F0F6FC">
    <animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- blinking cursor after name (subtle) -->
  <rect x="894" y="122" width="5" height="36" fill="#F0F6FC" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- stat 1 -->
  <text x="310" y="248" text-anchor="middle"
    fill="#F0F6FC"
    font-family="JetBrains Mono, Menlo, monospace"
    font-size="20"
    font-weight="700"
    letter-spacing="1">73.7%</text>
  <text x="310" y="266" text-anchor="middle"
    fill="#6E7681"
    font-family="JetBrains Mono, Menlo, monospace"
    font-size="10"
    letter-spacing="2">NEPALI BYPASS RATE</text>

  <!-- divider between stats -->
  <line x1="490" y1="240" x2="490" y2="272"
    stroke="#21262D" stroke-width="1"/>

  <!-- stat 2 -->
  <text x="600" y="248" text-anchor="middle"
    fill="#F0F6FC"
    font-family="JetBrains Mono, Menlo, monospace"
    font-size="20"
    font-weight="700"
    letter-spacing="1">1,200+</text>
  <text x="600" y="266" text-anchor="middle"
    fill="#6E7681"
    font-family="JetBrains Mono, Menlo, monospace"
    font-size="10"
    letter-spacing="2">ADVERSARIAL PROBES</text>

  <!-- divider between stats -->
  <line x1="710" y1="240" x2="710" y2="272"
    stroke="#21262D" stroke-width="1"/>

  <!-- stat 3 -->
  <text x="890" y="248" text-anchor="middle"
    fill="#F0F6FC"
    font-family="JetBrains Mono, Menlo, monospace"
    font-size="20"
    font-weight="700"
    letter-spacing="1">110.5%</text>
  <text x="890" y="266" text-anchor="middle"
    fill="#6E7681"
    font-family="JetBrains Mono, Menlo, monospace"
    font-size="10"
    letter-spacing="2">RTX 5060 SPEEDUP</text>

  <!-- bottom rule -->
  <line x1="60" y1="282" x2="1140" y2="282"
    stroke="#21262D" stroke-width="1"/>

  <!-- animated vertical accent lines far left/right -->
  <rect x="44" y="88" width="1" height="144" fill="#F0F6FC">
    <animate attributeName="opacity"
      values="0.04;0.18;0.04"
      dur="4.8s"
      repeatCount="indefinite"/>
  </rect>
  <rect x="1155" y="88" width="1" height="144" fill="#F0F6FC">
    <animate attributeName="opacity"
      values="0.18;0.04;0.18"
      dur="4.8s"
      repeatCount="indefinite"/>
  </rect>
</svg>