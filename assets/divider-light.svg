<svg width="1200" height="32" viewBox="0 0 1200 32" fill="none"
  xmlns="http://www.w3.org/2000/svg">

  <rect width="1200" height="32" fill="#FFFFFF"/>
  <line x1="0" y1="16" x2="1200" y2="16" stroke="#D0D7DE" stroke-width="1"/>

  <circle cx="0" cy="16" r="3" fill="#111827" opacity="0.8">
    <animate attributeName="cx"
      values="0;1200;0"
      dur="7s"
      keyTimes="0;0.5;1"
      keySplines="0.4 0 0.6 1;0.4 0 0.6 1"
      calcMode="spline"
      repeatCount="indefinite"/>
    <animate attributeName="opacity"
      values="0;0.7;0"
      dur="7s"
      repeatCount="indefinite"/>
  </circle>

  <rect x="597" y="13" width="6" height="6" fill="#D0D7DE"
    transform="rotate(45 600 16)"/>
  <rect x="598" y="14" width="4" height="4" fill="#111827" opacity="0.3"
    transform="rotate(45 600 16)">
    <animate attributeName="opacity"
      values="0.15;0.7;0.15"
      dur="2.4s"
      repeatCount="indefinite"/>
  </rect>
</svg>